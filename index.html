<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 Student Result Management</h1>

<div class="container">

    <input type="text" id="name" placeholder="Student Name">

    <input type="text" id="sub1name" placeholder="Subject 1 Name">
    <input type="number" id="sub1marks" placeholder="Marks">

    <input type="text" id="sub2name" placeholder="Subject 2 Name">
    <input type="number" id="sub2marks" placeholder="Marks">

    <input type="text" id="sub3name" placeholder="Subject 3 Name">
    <input type="number" id="sub3marks" placeholder="Marks">

    <button onclick="calculateResult()">Calculate Result</button>

    <h3 id="result"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
